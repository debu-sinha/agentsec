# agentsec security policy — corporate baseline
#
# Enforce organizational security standards in CI/CD:
#   agentsec scan --policy examples/policies/corporate.yaml
#
# Rules with action: fail cause a non-zero exit code.
# Rules with action: warn generate findings but don't fail the build.

name: corporate-baseline
version: "1.0"
description: >
  Standard security policy for production agent deployments.
  Zero tolerance for critical findings, grade B minimum.

rules:
  - id: POL-001
    name: Zero critical findings
    description: No critical findings allowed in any scan
    condition:
      severity: critical
      max_count: 0
    action: fail

  - id: POL-002
    name: Limited HIGH findings
    description: At most 3 HIGH findings allowed
    condition:
      severity: high
      max_count: 3
    action: fail

  - id: POL-003
    name: No plaintext secrets
    description: No hardcoded credentials in configuration or source
    condition:
      category: plaintext_secret
      max_count: 0
    action: fail

  - id: POL-004
    name: No exposed tokens
    description: No API tokens committed to version control
    condition:
      category: exposed_token
      max_count: 0
    action: fail

  - id: POL-005
    name: Minimum grade B
    description: Posture grade must be A or B
    condition:
      type: posture_grade
      min_grade: B
    action: fail

  - id: POL-006
    name: MCP tool poisoning awareness
    description: Flag any MCP tool poisoning findings for review
    condition:
      category: mcp_tool_poisoning
      max_count: 0
    action: warn

# Exemptions for known/accepted risks (uncomment to use):
# exemptions:
#   - finding_id: "abc123def456"
#     rule_id: POL-002
#     reason: "Legacy integration, approved by security team"
#     expires: "2026-12-31"
